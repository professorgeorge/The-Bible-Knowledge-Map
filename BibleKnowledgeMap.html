<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Knowledge Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #F5F0E8;
  --bg-panel:   #EDE6D8;
  --bg-sidebar: #E8E0CF;
  --bg-detail:  #FDFAF5;
  --border:     #CEC3AF;
  --border-lt:  #DDD4C2;
  --text:       #1C1814;
  --text-md:    #4A4236;
  --text-sm:    #6E6254;
  --accent:     #6B3A2A;
  --accent-lt:  #8A4E3A;
  --header-bg:  #242018;
  --header-txt: #E8DFC8;
  --option-h:   38px;
  --header-h:   56px;
  --sidebar-w:  252px;
  --detail-w:   320px;
  --font-serif: 'EB Garamond', Georgia, 'Times New Roman', serif;
  --font-ui:    system-ui, -apple-system, sans-serif;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; }

/* ── OPTION SWITCHER ─────────────────────────────────────────────────────── */
#option-switcher {
  height: var(--option-h);
  background: var(--header-bg);
  display: flex; align-items: center; gap: 2px;
  padding: 0 16px;
  border-bottom: 1px solid #3A3428;
  flex-shrink: 0;
}
#option-switcher .opt-label {
  font-size: 10.5px; letter-spacing: .06em; color: #7A7060; text-transform: uppercase;
  margin-right: 10px; font-family: var(--font-ui);
}
[data-option] {
  padding: 5px 14px; font-size: 12px; border-radius: 3px; border: 1px solid #4A4030;
  background: transparent; color: #9A9080; cursor: pointer; font-family: var(--font-ui);
  transition: all .15s;
}
[data-option].active { background: #4A3828; color: #E8D8B8; border-color: #7A5838; }
[data-option]:hover:not(.active) { background: #2E2820; color: #C8B898; }
.opt-desc {
  font-size: 10.5px; color: #5A5040; margin-left: 16px; font-style: italic;
  font-family: var(--font-serif);
}

/* ── APP SHELL ───────────────────────────────────────────────────────────── */
#app-shell {
  display: flex; flex-direction: column;
  height: calc(100vh - var(--option-h));
}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
#app-header {
  height: var(--header-h); background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
  flex-shrink: 0; z-index: 10;
}
#app-title {
  font-family: var(--font-serif); font-size: 18px; font-weight: 600;
  color: var(--text); white-space: nowrap; letter-spacing: -.01em;
}
#app-title span { color: var(--accent); }
.header-sep { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

/* Search */
#search-container { position: relative; flex: 1; max-width: 360px; }
#search-input {
  width: 100%; padding: 7px 12px 7px 32px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-detail); color: var(--text); font-family: var(--font-ui);
  outline: none; transition: border-color .15s;
}
#search-input:focus { border-color: var(--accent); }
#search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-sm); font-size: 12px; pointer-events: none;
}
#search-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-detail); border: 1px solid var(--border); border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 100; overflow: hidden;
}
.search-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; transition: background .1s;
}
.search-item:hover { background: var(--bg-panel); }
.search-item-badge {
  font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 2px;
  flex-shrink: 0; font-family: var(--font-ui);
}
.search-item-label { flex: 1; font-size: 13px; font-family: var(--font-serif); }
.search-item-label mark { background: #F5D88A; color: inherit; padding: 0 1px; }
.search-item-type { font-size: 10.5px; color: var(--text-sm); }

/* View toggles */
#view-controls { display: flex; gap: 2px; }
[data-view] {
  padding: 5px 13px; font-size: 12px; border: 1px solid var(--border-lt);
  background: transparent; color: var(--text-md); cursor: pointer; border-radius: 3px;
  font-family: var(--font-ui); transition: all .15s;
}
[data-view].active { background: var(--accent); color: white; border-color: var(--accent); }
[data-view]:hover:not(.active) { background: var(--bg-sidebar); }

/* ── BODY ────────────────────────────────────────────────────────────────── */
#app-body {
  flex: 1; display: flex; overflow: hidden;
  min-height: 0;
}

/* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg-sidebar); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 12px 0;
}
.sidebar-section { padding: 10px 14px; border-bottom: 1px solid var(--border-lt); }
.sidebar-label {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--text-sm); margin-bottom: 8px; font-weight: 600;
}
.toggle-row { display: flex; gap: 4px; }
.tog-btn {
  flex: 1; padding: 5px 0; font-size: 11.5px; border: 1px solid var(--border);
  background: var(--bg); border-radius: 3px; cursor: pointer; color: var(--text-md);
  font-family: var(--font-ui); transition: all .12s;
}
.tog-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.filter-check {
  display: flex; align-items: center; gap: 7px; margin-bottom: 6px;
  cursor: pointer; font-size: 12.5px; color: var(--text-md);
}
.filter-check input { display: none; }
.check-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  opacity: .85; transition: opacity .1s;
}
.filter-check input:not(:checked) ~ .check-dot { opacity: .25; }
.filter-check input:not(:checked) ~ span { color: var(--text-sm); }
.sb-select {
  width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid var(--border);
  background: var(--bg); border-radius: 3px; color: var(--text-md);
  font-family: var(--font-ui); cursor: pointer; outline: none;
}
.legend-grid { display: flex; flex-direction: column; gap: 5px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--text-md); }
.legend-text { font-family: var(--font-serif); }
.sidebar-stats { }
.count-row {
  display: flex; align-items: center; gap: 6px; padding: 2px 0;
  font-size: 11.5px; color: var(--text-md);
}
.count-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.count-num { margin-left: auto; font-weight: 600; color: var(--text); }
.total-row { border-top: 1px solid var(--border-lt); margin-top: 4px; padding-top: 5px; color: var(--text-sm); }

/* ── MAIN VIEW ───────────────────────────────────────────────────────────── */
#main-view { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

/* Network */
#network-view {
  flex: 1; display: flex; position: relative;
  background: #FAFAF6;
  background-image: radial-gradient(circle, #D8CEB8 1px, transparent 1px);
  background-size: 28px 28px;
}
.network-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }

/* Timeline */
#timeline-view { flex: 1; display: none; flex-direction: column; overflow: hidden; background: var(--bg); }

.tl-bar {
  display: flex; overflow-x: auto; flex-shrink: 0;
  border-bottom: 2px solid var(--border);
  background: var(--bg-panel);
}
.tl-bar::-webkit-scrollbar { height: 4px; }
.tl-bar::-webkit-scrollbar-thumb { background: var(--border); }
.tl-period {
  padding: 10px 16px; min-width: 140px; cursor: pointer; flex-shrink: 0;
  border-right: 1px solid var(--border-lt); transition: background .12s;
}
.tl-period:hover { background: var(--bg-sidebar); }
.tl-period.tl-active { background: var(--bg-sidebar); }
.tl-period-name { font-family: var(--font-serif); font-size: 13px; font-weight: 600; color: var(--text); }
.tl-period-years { font-size: 10px; color: var(--text-sm); margin-top: 2px; }
.tl-period-count { font-size: 10px; color: var(--text-sm); margin-top: 1px; }

.tl-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.tl-content-header {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border-lt); padding-bottom: 10px;
}
.tl-content-header h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 600; }
.tl-years-badge {
  font-size: 11px; color: var(--text-sm); background: var(--bg-panel);
  border: 1px solid var(--border-lt); padding: 2px 8px; border-radius: 10px;
}
.tl-count-badge {
  font-size: 11px; color: var(--text-sm); margin-left: auto;
}

.tl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.tl-card {
  background: var(--bg-detail); border: 1px solid var(--border-lt);
  border-radius: 5px; border-top: 3px solid var(--node-color, #888);
  overflow: hidden; transition: box-shadow .15s;
}
.tl-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.tl-card.theme-card { border-top-style: dashed; opacity: .92; }
.tl-card-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  cursor: pointer; border-bottom: 1px solid var(--border-lt);
}
.tl-card-type {
  font-size: 9.5px; font-weight: 700; padding: 2px 6px; border-radius: 2px;
  text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
}
.tl-card-title { flex: 1; font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--text); }
.tl-expand-btn {
  width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-lt);
  background: var(--bg-panel); cursor: pointer; font-size: 9px; color: var(--text-sm);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background .12s;
}
.tl-expand-btn:hover { background: var(--border-lt); }
.tl-card-summary {
  padding: 8px 12px; font-size: 12px; color: var(--text-md); line-height: 1.55;
  font-family: var(--font-serif);
}
.tl-card-relations { padding: 0 12px 8px; border-top: 1px solid var(--border-lt); margin-top: 4px; }
.tl-card-relations.hidden { display: none; }
.tl-rel {
  display: flex; align-items: center; gap: 6px; padding: 5px 0;
  border-bottom: 1px solid var(--border-lt); cursor: pointer;
  font-size: 12px; transition: opacity .1s;
}
.tl-rel:hover { opacity: .75; }
.tl-rel:last-child { border-bottom: none; }
.tl-rel-dir { color: var(--text-sm); font-size: 11px; width: 12px; }
.tl-rel-lbl { color: var(--text-sm); font-style: italic; font-family: var(--font-serif); flex-shrink: 0; }
.tl-rel-node { font-weight: 600; font-family: var(--font-serif); font-size: 13px; }
.tl-rel-none { padding: 8px 0; font-size: 11.5px; color: var(--text-sm); font-style: italic; }
.tl-passages { padding: 6px 12px 10px; display: flex; flex-wrap: wrap; gap: 4px; }
.tl-passages.hidden { display: none; }
.tl-empty { text-align: center; color: var(--text-sm); padding: 40px; font-family: var(--font-serif); font-style: italic; }

/* Map */
#map-view { flex: 1; display: none; align-items: center; justify-content: center; background: var(--bg); overflow: hidden; }
.map-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }
.map-title-bar {
  background: var(--bg-panel); border-bottom: 1px solid var(--border);
  padding: 7px 16px; font-size: 11px; color: var(--text-sm); font-family: var(--font-serif);
  font-style: italic; flex-shrink: 0;
}
.geo-svg { flex: 1; width: 100%; min-height: 0; }
.map-legend { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 6px 16px; flex-shrink: 0; }
.map-legend-title { font-size: 11px; color: var(--text-sm); font-style: italic; font-family: var(--font-serif); }

/* ── DETAIL PANEL ────────────────────────────────────────────────────────── */
#detail-panel {
  width: 0; flex-shrink: 0; overflow: hidden;
  background: var(--bg-detail); border-left: 1px solid var(--border);
  transition: width .2s ease; display: flex; flex-direction: column;
}
#detail-panel.open { width: var(--detail-w); overflow-y: auto; }

.dp-header {
  padding: 16px 16px 12px; position: relative;
  border-bottom: 1px solid var(--border-lt);
}
.dp-badge {
  display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 2px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
}
.dp-title {
  font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--text);
  line-height: 1.2; margin-bottom: 4px;
}
.dp-testament { font-size: 11px; color: var(--text-sm); }
.dp-close {
  position: absolute; top: 14px; right: 14px; width: 24px; height: 24px;
  border-radius: 50%; border: 1px solid var(--border); background: var(--bg-panel);
  cursor: pointer; font-size: 10px; color: var(--text-sm); display: flex;
  align-items: center; justify-content: center; transition: background .1s;
}
.dp-close:hover { background: var(--border-lt); }

.dp-section { padding: 12px 16px; border-bottom: 1px solid var(--border-lt); }
.dp-section:last-child { border-bottom: none; }
.dp-section-label {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--text-sm); font-weight: 600; margin-bottom: 6px;
}
.dp-dates { font-family: var(--font-serif); font-size: 14px; color: var(--text-md); }
.dp-period { border-radius: 3px; font-family: var(--font-serif); }
.dp-geo { font-family: var(--font-serif); font-size: 14px; color: var(--text-md); }
.dp-summary {
  font-family: var(--font-serif); font-size: 14px; line-height: 1.65;
  color: var(--text-md); text-wrap: pretty;
}
.dp-passages { display: flex; flex-wrap: wrap; gap: 4px; }

.passage-tag {
  font-size: 11.5px; padding: 2px 8px; background: var(--bg-panel);
  border: 1px solid var(--border-lt); border-radius: 3px; color: var(--accent);
  font-family: var(--font-serif); white-space: nowrap;
}

.dp-relations { display: flex; flex-direction: column; gap: 0; }
.rel-item {
  display: flex; align-items: center; gap: 6px; padding: 6px 0;
  border-bottom: 1px solid var(--border-lt); cursor: pointer; transition: background .1s;
}
.rel-item:last-child { border-bottom: none; }
.rel-item:hover { background: var(--bg-panel); margin: 0 -16px; padding: 6px 16px; }
.rel-dir { font-size: 11px; color: var(--text-sm); width: 14px; flex-shrink: 0; }
.rel-label { font-style: italic; color: var(--text-sm); font-size: 11.5px; font-family: var(--font-serif); flex-shrink: 0; min-width: 80px; }
.rel-target { font-family: var(--font-serif); font-size: 13px; font-weight: 600; flex: 1; }
.rel-type-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; flex-shrink: 0;
}

/* ── EMPTY STATE ─────────────────────────────────────────────────────────── */
.empty-hint {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; pointer-events: none;
  opacity: .45; gap: 8px;
}
.empty-hint-title { font-family: var(--font-serif); font-size: 15px; color: var(--text-md); font-style: italic; }
.empty-hint-sub { font-size: 11.5px; color: var(--text-sm); }

/* ── OPTION B LAYOUT TWEAKS ──────────────────────────────────────────────── */
#app-shell[data-option="B"] .tl-bar {
  background: #ECEAD8;
}
#app-shell[data-option="B"] .tl-period.tl-active {
  background: white;
}

/* ── TOOLTIP ────────────────────────────────────────────────────────────── */
#node-tooltip {
  display: none; position: fixed; z-index: 200; pointer-events: none;
  background: var(--bg-detail); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,.14);
  max-width: 200px;
}
.tt-type { font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-bottom: 3px; }
.tt-name { font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--text); }
.tt-dates { font-size: 10.5px; color: var(--text-sm); margin-top: 3px; font-family: var(--font-serif); font-style: italic; }

/* ── BREADCRUMB ──────────────────────────────────────────────────────────── */
.dp-breadcrumb {
  display: flex; align-items: center; flex-wrap: wrap; gap: 3px;
  padding: 6px 16px 0; font-size: 11px; color: var(--text-sm);
  border-bottom: 1px solid var(--border-lt); margin-bottom: 0; padding-bottom: 6px;
}
.bc-item {
  cursor: pointer; color: var(--accent); font-family: var(--font-serif);
  transition: opacity .12s;
}
.bc-item:hover { opacity: .7; }
.bc-sep { color: var(--border); font-size: 10px; }
.bc-current { color: var(--text-md); font-family: var(--font-serif); }

/* ── PATH FINDER ─────────────────────────────────────────────────────────── */
.pf-container { display: flex; flex-direction: column; gap: 4px; }
.pf-find-btn {
  margin-top: 4px; padding: 6px 10px; background: var(--accent); color: white;
  border: none; border-radius: 3px; font-size: 12px; cursor: pointer;
  font-family: var(--font-ui); transition: opacity .12s;
}
.pf-find-btn:hover { opacity: .85; }
.pf-result { padding: 0; }
#pf-result { margin-top: 6px; }
.pf-msg { font-size: 11.5px; color: var(--text-sm); font-style: italic; padding: 4px 0; font-family: var(--font-serif); }
.pf-chain {
  display: flex; flex-wrap: wrap; align-items: center; gap: 3px;
  padding: 6px 0; font-family: var(--font-serif);
}
.pf-node { font-size: 12.5px; font-weight: 600; cursor: pointer; transition: opacity .12s; }
.pf-node:hover { opacity: .7; }
.pf-arr { color: var(--text-sm); font-size: 11px; }
.pf-info { font-size: 10.5px; color: var(--text-sm); padding: 2px 0 4px; }
.pf-clear-btn {
  font-size: 10.5px; padding: 3px 8px; border: 1px solid var(--border);
  background: var(--bg); border-radius: 3px; cursor: pointer; color: var(--text-sm);
  font-family: var(--font-ui);
}
.pf-clear-btn:hover { background: var(--bg-panel); }

/* ── TOOL CONTROLS (edge-label + color-mode) ─────────────────────────────── */
#tool-controls { display: flex; gap: 2px; flex-shrink: 0; }
.tool-btn {
  padding: 5px 11px; font-size: 11.5px; border: 1px solid var(--border-lt);
  background: transparent; color: var(--text-sm); cursor: pointer; border-radius: 3px;
  font-family: var(--font-ui); transition: all .15s; white-space: nowrap;
}
.tool-btn.active { background: var(--bg-sidebar); color: var(--text); border-color: var(--border); }
.tool-btn:hover:not(.active) { background: var(--bg-panel); }

/* ── RELATIONSHIP TYPE FILTER ────────────────────────────────────────────── */
.rel-type-filters { display: flex; flex-direction: column; gap: 3px; }
.rel-type-btn {
  display: flex; align-items: center; gap: 7px; padding: 5px 8px;
  border: 1px solid var(--border); border-left: 3px solid transparent;
  border-radius: 3px; background: var(--bg);
  cursor: pointer; font-size: 11.5px; color: var(--text-md);
  font-family: var(--font-ui); text-align: left; transition: all .12s; line-height: 1.3;
}
.rel-type-btn.active {
  background: var(--bg-panel);
  border-left-color: var(--rt-color, var(--accent));
  font-weight: 600; color: var(--text);
}
.rel-type-btn:hover:not(.active) { background: var(--bg-panel); }

/* ── FOOTER CREDIT ───────────────────────────────────────────────────────── */
#app-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 4px 16px; text-align: center;
  font-size: 10.5px; color: var(--text-sm); font-family: var(--font-serif);
  font-style: italic; background: var(--bg-panel);
  border-top: 1px solid var(--border-lt);
}
#app-footer a { color: var(--accent); text-decoration: none; }
#app-footer a:hover { text-decoration: underline; }
#app-shell { height: calc(100vh - var(--option-h) - 22px); }

/* ── PRINT ──────────────────────────────────────────────────────────────── */
@media print {
  #option-switcher, #app-header, #sidebar, #tool-controls { display: none !important; }
  #app-body { display: block !important; }
  #detail-panel.open { width: 100% !important; border: none; overflow: visible; }
  .dp-section { break-inside: avoid; }
}

/* ── SCROLLBARS ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #B0A898; }

/* ── TABLET (max 1024px) ─────────────────────────────────────────────────── */
@media (max-width: 1024px) {
  :root { --sidebar-w: 200px; --detail-w: 280px; }
  #app-title { font-size: 15px; }
  .tl-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}

<script>
// Bible Knowledge Map — App State, Sidebar, Detail Panel, Search
// ──────────────────────────────────────────────────────────────

const APP = {
  state: {
    option: 'A',           // 'A' (network) | 'B' (timeline)
    view: 'network',       // 'network' | 'timeline' | 'map'
    selectedId: null,
    hoveredId: null,
    filters: {
      testament: { OT: true, NT: true, both: true },
      types: { person: true, place: true, event: true, theme: true, prophecy: true, book: true },
      period: 'all',
      relType: 'all'
    },
    search: '',
    timelinePeriod: 'nt',
    expandedCards: new Set(),
    colorMode: 'type',
    showEdgeLabels: true,
    navHistory: [],
    pathHighlight: null
  },

  listeners: {},

  on(event, fn) {
    if (!this.listeners[event]) this.listeners[event] = [];
    this.listeners[event].push(fn);
  },

  emit(event, data) {
    (this.listeners[event] || []).forEach(fn => fn(data));
  },

  // Returns visible node IDs given current filters
  visibleNodeIds() {
    const { testament, types, period } = this.state.filters;
    return NODES
      .filter(n => {
        const tOk = testament[n.testament] !== false;
        const typeOk = types[n.type] !== false;
        const periodOk = period === 'all' || n.period === period || n.period === null;
        return tOk && typeOk && periodOk;
      })
      .map(n => n.id);
  },

  visibleEdgeIds() {
    const vis = new Set(this.visibleNodeIds());
    const relType = this.state.filters.relType;
    return EDGES.filter(e =>
      vis.has(e.source) && vis.has(e.target) &&
      (relType === 'all' || e.relType === relType)
    ).map(e => e.id);
  },

  selectNode(id, suppressHistory = false) {
    if (!suppressHistory && id && id !== this.state.selectedId) {
      this.state.navHistory.push(id);
      if (this.state.navHistory.length > 12) this.state.navHistory.shift();
    }
    if (!id) this.state.pathHighlight = null;
    this.state.selectedId = id;
    this.emit('nodeSelected', id ? NODES.find(n => n.id === id) : null);
    renderDetailPanel(id ? NODES.find(n => n.id === id) : null);
  },

  findPath(fromId, toId) {
    const adj = {};
    NODES.forEach(n => { adj[n.id] = []; });
    EDGES.forEach(e => {
      const s = typeof e.source === 'object' ? e.source.id : e.source;
      const t = typeof e.target === 'object' ? e.target.id : e.target;
      if (adj[s]) adj[s].push({ node: t, edge: e });
      if (adj[t]) adj[t].push({ node: s, edge: e });
    });
    const visited = new Set([fromId]);
    const queue = [{ path: [fromId], edges: [] }];
    while (queue.length) {
      const { path, edges } = queue.shift();
      const last = path[path.length - 1];
      for (const { node, edge } of (adj[last] || [])) {
        if (node === toId) return { nodes: [...path, node], edges: [...edges, edge] };
        if (!visited.has(node)) {
          visited.add(node);
          queue.push({ path: [...path, node], edges: [...edges, edge] });
        }
      }
    }
    return null;
  }
};

// ── SEARCH ──────────────────────────────────────────────────────────────────

function initSearch() {
  const input = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');
  if (!input || !dropdown) return;

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    APP.state.search = q;
    if (!q) { dropdown.style.display = 'none'; return; }

    const matches = NODES.filter(n =>
      n.label.toLowerCase().includes(q) ||
      (n.summary && n.summary.toLowerCase().includes(q))
    ).slice(0, 10);

    if (!matches.length) { dropdown.style.display = 'none'; return; }

    dropdown.innerHTML = matches.map(n => {
      const cfg = NODE_TYPES[n.type];
      return `<div class="search-item" data-id="${n.id}" style="border-left: 3px solid ${cfg.color}">
        <span class="search-item-badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.abbr}</span>
        <span class="search-item-label">${highlightMatch(n.label, q)}</span>
        <span class="search-item-type">${cfg.label}</span>
      </div>`;
    }).join('');

    dropdown.style.display = 'block';

    dropdown.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('click', () => {
        const node = NODES.find(n => n.id === el.dataset.id);
        if (node) {
          input.value = node.label;
          dropdown.style.display = 'none';
          APP.selectNode(node.id);
          APP.emit('focusNode', node.id);
        }
      });
    });
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#search-container')) dropdown.style.display = 'none';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { dropdown.style.display = 'none'; input.blur(); }
  });
}

function highlightMatch(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) +
    `<mark>${text.slice(idx, idx + q.length)}</mark>` +
    text.slice(idx + q.length);
}

      <div class="sidebar-label">Visible</div>

  `;

      if (t === 'OT') cur.OT = !cur.OT;
      if (t === 'NT') cur.NT = !cur.NT;
      cur.both = cur.OT || cur.NT;

  sb.querySelectorAll('input[data-type]').forEach(cb => {

      APP.state.filters.types[cb.dataset.type] = cb.checked;

  sb.querySelectorAll('.rel-type-btn').forEach(btn => {

  // Path finder
  const pfBtn = document.getElementById('pf-btn');
  if (pfBtn) {
    pfBtn.addEventListener('click', () => {
      const fromVal = document.getElementById('pf-from').value;

      if (!path) {

      } else {

          `<button class="pf-clear-btn" id="pf-clear">Clear path</button>`;
        APP.emit('pathHighlight', path);

    case 'event':    return `<svg width="${s.w}" height="${s.h}"><rect x="2" y="4" width="16" height="12" fill="${color}"/></svg>`;
    case 'theme':    return `<svg width="${s.w}" height="${s.h}"><polygon points="10,1 18,5.5 18,14.5 10,19 2,14.5 2,5.5" fill="${color}"/></svg>`;
    case 'book':     return `<svg width="${s.w}" height="${s.h}"><rect x="2" y="2" width="16" height="16" rx="3" fill="${color}"/></svg>`;
    case 'prophecy': return `<svg width="${s.w}" height="${s.h}"><polygon points="10,1 12.9,7.8 20,8.2 14.5,13 16.5,20 10,16 3.5,20 5.5,13 0,8.2 7.1,7.8" fill="${color}"/></svg>`;
    default:         return `<svg width="${s.w}" height="${s.h}"><circle cx="10" cy="10" r="7" fill="${color}"/></svg>`;
  }
}

function updateVisibleCounts() {
  const el = document.getElementById('visible-counts');
  if (!el) return;
  const vis = APP.visibleNodeIds();
  const counts = {};
  vis.forEach(id => {
    const n = NODES.find(x => x.id === id);
    if (n) counts[n.type] = (counts[n.type] || 0) + 1;
  });
  el.innerHTML = Object.entries(counts).map(([type, cnt]) => {
    const cfg = NODE_TYPES[type];
    return `<div class="count-row"><span class="count-dot" style="background:${cfg.color}"></span><span>${cfg.label}</span><span class="count-num">${cnt}</span></div>`;
  }).join('') + `<div class="count-row total-row"><span>Edges</span><span class="count-num">${APP.visibleEdgeIds().length}</span></div>`;
}

function applyFilters() {
  updateVisibleCounts();
  APP.emit('pathHighlight', null);
  APP.emit('filtersChanged', { nodeIds: APP.visibleNodeIds(), edgeIds: APP.visibleEdgeIds() });
}

// ── DETAIL PANEL ─────────────────────────────────────────────────────────────

function renderDetailPanel(node) {
  const panel = document.getElementById('detail-panel');
  if (!panel) return;

  if (!node) {
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }

  panel.classList.add('open');
  const cfg = NODE_TYPES[node.type];
  const relatedEdges = EDGES.filter(e => e.source === node.id || e.target === node.id);

  // Breadcrumb: previous navigation items (all except current)
  const histItems = APP.state.navHistory.slice(-6, -1);
  const breadcrumb = histItems.length ? `<div class="dp-breadcrumb">${histItems.map(hId => {
    const hn = NODES.find(n => n.id === hId); if (!hn) return '';
    return `<span class="bc-item" data-id="${hId}">${hn.label}</span><span class="bc-sep">›</span>`;
  }).join('')}</div>` : '';

  const relItems = relatedEdges.map(edge => {
    const otherId = edge.source === node.id ? edge.target : edge.source;
    const other = NODES.find(n => n.id === otherId);
    if (!other) return '';
    const oCfg = NODE_TYPES[other.type];
    const direction = edge.source === node.id ? '→' : '←';
    return `<div class="rel-item" data-id="${other.id}">
      <span class="rel-dir">${direction}</span>
      <span class="rel-label">${edge.label}</span>
      <span class="rel-target" style="color:${oCfg.color}">${other.label}</span>
      <span class="rel-type-badge" style="background:${oCfg.bg};color:${oCfg.color}">${oCfg.abbr}</span>
    </div>`;
  }).join('');

  const period = node.period ? PERIODS.find(p => p.id === node.period) : null;

  panel.innerHTML = `
    ${breadcrumb}
    <div class="dp-header" style="border-left: 4px solid ${cfg.color}">
      <div class="dp-badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</div>
      <h2 class="dp-title">${node.label}</h2>
      ${node.testament ? `<div class="dp-testament">${node.testament === 'both' ? 'Old & New Testament' : node.testament === 'OT' ? 'Old Testament' : 'New Testament'}</div>` : ''}
      <button class="dp-close" id="dp-close-btn" aria-label="Close">✕</button>
    </div>

    ${node.dates ? `<div class="dp-section">
      <div class="dp-section-label">Timeline Placement</div>
      <div class="dp-dates">${node.dates}</div>
      ${period ? `<div class="dp-period" style="background:${period.color}22;border-left:3px solid ${period.color};padding:6px 10px;margin-top:6px;font-size:12px;color:${period.color === '#C8A87A' ? '#7A5A2A' : '#3A3A3A'}">${period.label} — ${period.years}</div>` : ''}
    </div>` : ''}

    ${node.geo && typeof node.geo === 'string' ? `<div class="dp-section">
      <div class="dp-section-label">Geography</div>
      <div class="dp-geo">${node.geo}</div>
    </div>` : ''}

    <div class="dp-section">
      <div class="dp-section-label">Summary</div>
      <p class="dp-summary">${node.summary}</p>
    </div>

    ${node.passages && node.passages.length ? `<div class="dp-section">
      <div class="dp-section-label">Key Passages</div>
      <div class="dp-passages">${node.passages.map(p => `<span class="passage-tag">${p}</span>`).join('')}</div>
    </div>` : ''}

    ${relItems ? `<div class="dp-section">
      <div class="dp-section-label">Relationships (${relatedEdges.length})</div>
      <div class="dp-relations">${relItems}</div>
    </div>` : ''}
  `;

  panel.querySelector('#dp-close-btn').addEventListener('click', () => APP.selectNode(null));
  panel.querySelectorAll('.rel-item').forEach(el => {
    el.addEventListener('click', () => {
      APP.selectNode(el.dataset.id);
      APP.emit('focusNode', el.dataset.id);
    });
  });
  panel.querySelectorAll('.bc-item').forEach(el => {
    el.addEventListener('click', () => {
      APP.selectNode(el.dataset.id, true);
      APP.emit('focusNode', el.dataset.id);
    });
  });
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────────

function initViewSwitcher() {
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.view;
      APP.state.view = v;
      document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === v));
      document.getElementById('network-view').style.display  = v === 'network'  ? 'flex' : 'none';
      document.getElementById('timeline-view').style.display = v === 'timeline' ? 'flex' : 'none';
      document.getElementById('map-view').style.display      = v === 'map'      ? 'flex' : 'none';
      if (v === 'timeline') renderTimelineView();
    });
  });
}

function initOptionSwitcher() {
  document.querySelectorAll('[data-option]').forEach(btn => {
    btn.addEventListener('click', () => {
      const opt = btn.dataset.option;
      APP.state.option = opt;
      document.querySelectorAll('[data-option]').forEach(b => b.classList.toggle('active', b.dataset.option === opt));
      document.getElementById('app-shell').dataset.option = opt;
      if (opt === 'B') {
        // Switch to timeline view for option B
        document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === 'timeline'));
        document.getElementById('network-view').style.display  = 'none';
        document.getElementById('timeline-view').style.display = 'flex';
        document.getElementById('map-view').style.display      = 'none';
        APP.state.view = 'timeline';
        renderTimelineView();
      } else {
        document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === 'network'));
        document.getElementById('network-view').style.display  = 'flex';
        document.getElementById('timeline-view').style.display = 'none';
        document.getElementById('map-view').style.display      = 'none';
        APP.state.view = 'network';
      }
    });
  });
}

</script>
<script>
// Bible Knowledge Map — Network View (D3) + Timeline View + Geo Map View
// ───────────────────────────────────────────────────────────────────────

// ── SHAPE HELPERS ────────────────────────────────────────────────────────────

function diamondPath(r) {
  return `M 0,${-r} L ${r},0 L 0,${r} L ${-r},0 Z`;
}
function hexPath(r) {
  const pts = Array.from({length: 6}, (_, i) => {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    return `${(r * Math.cos(a)).toFixed(2)},${(r * Math.sin(a)).toFixed(2)}`;
  });
  return `M ${pts.join(' L ')} Z`;
}
function starPath(r) {
  const inner = r * 0.44;
  const pts = Array.from({length: 10}, (_, i) => {
    const rad = i % 2 === 0 ? r : inner;
    const a = (Math.PI * 2 * i / 10) - Math.PI / 2;
    return `${(rad * Math.cos(a)).toFixed(2)},${(rad * Math.sin(a)).toFixed(2)}`;
  });
  return `M ${pts.join(' L ')} Z`;
}

// ── COLOR MODE HELPERS ──────────────────────────────────────────────────────────
function getNodeFill(d) {
  if (typeof APP !== 'undefined' && APP.state.colorMode === 'period' && d.period) {
    const p = PERIODS.find(pr => pr.id === d.period);
    return p ? p.color + '3A' : NODE_TYPES[d.type].bg;
  }
  return NODE_TYPES[d.type].bg;
}
function getNodeStroke(d) {
  if (typeof APP !== 'undefined' && APP.state.colorMode === 'period' && d.period) {
    const p = PERIODS.find(pr => pr.id === d.period);
    return p ? p.color : NODE_TYPES[d.type].color;
  }
  return NODE_TYPES[d.type].color;
}

// ── D3 NETWORK VIEW ──────────────────────────────────────────────────────────

let networkSim = null;
let networkSvg = null;

function getNetworkDims(container) {
  // Try multiple sources, progressively more aggressive
  const bcrW = container.getBoundingClientRect().width;
  const bcrH = container.getBoundingClientRect().height;
  const offW = container.offsetWidth;
  const offH = container.offsetHeight;
  const sidebarW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w')) || 252;
  const winW = window.innerWidth - sidebarW - 10;
  const winH = window.innerHeight - 100; // option bar + header
  return {
    W: bcrW > 10 ? bcrW : (offW > 10 ? offW : winW),
    H: bcrH > 10 ? bcrH : (offH > 10 ? offH : winH)
  };
}

function initNetworkView() {
  const container = document.getElementById('network-view');
  if (!container || container.dataset.initialized) return;
  container.dataset.initialized = 'true';

  const { W, H } = getNetworkDims(container);

  // Deep-clone nodes/edges for D3 (it mutates them)
  const simNodes = NODES.map(d => Object.assign({}, d));
  const simEdges = EDGES.map(e => Object.assign({}, e));

  // Degree map — use original EDGES (strings) before D3 replaces them with objects
  const degreeMap = {};
  NODES.forEach(n => { degreeMap[n.id] = 0; });
  EDGES.forEach(e => {
    degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
    degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
  });
  const maxDeg = Math.max(1, ...Object.values(degreeMap));
  function nodeRadius(d) {
    return Math.round(13 + Math.min(13, ((degreeMap[d.id] || 1) / maxDeg) * 14));
  }

  // Seed initial positions by type cluster
  const clusters = {
    person: { x: -80, y: 0 }, place: { x: 140, y: 60 },
    event:  { x: 40,  y: 180 }, theme: { x: -160, y: -140 },
    book:   { x: -200, y: 80 }, prophecy: { x: 160, y: -140 }
  };
  simNodes.forEach(d => {
    const c = clusters[d.type] || { x: 0, y: 0 };
    d.x = W / 2 + c.x + (Math.random() - 0.5) * 60;
    d.y = H / 2 + c.y + (Math.random() - 0.5) * 60;
  });

  const svg = d3.select(container).append('svg')
    .attr('width', '100%').attr('height', '100%')
    .attr('class', 'network-svg');

  networkSvg = svg;

  // Zoom layer
  const g = svg.append('g').attr('class', 'zoom-layer');

  svg.call(d3.zoom()
    .scaleExtent([0.15, 3])
    .on('zoom', ev => g.attr('transform', ev.transform)));

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '-0 -5 10 10')
    .attr('refX', 28).attr('refY', 0)
    .attr('orient', 'auto').attr('markerWidth', 6).attr('markerHeight', 6)
    .append('path').attr('d', 'M 0,-4 L 10,0 L 0,4').attr('fill', '#B0A898');

  // Force simulation
  const simulation = d3.forceSimulation(simNodes)
    .force('link',    d3.forceLink(simEdges).id(d => d.id).distance(130).strength(0.4))
    .force('charge',  d3.forceManyBody().strength(-420))
    .force('center',  d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide(d => nodeRadius(d) + 16).strength(0.7));

  networkSim = simulation;

  // Edge layer
  const linkG = g.append('g').attr('class', 'edges');
  const edgeSel = linkG.selectAll('.edge').data(simEdges).join('g').attr('class', 'edge');

  edgeSel.append('line')
    .attr('stroke', d => (REL_TYPES[d.relType] || {color:'#C8BEA8'}).color)
    .attr('stroke-width', 1.4)
    .attr('stroke-dasharray', d => (REL_TYPES[d.relType] || {}).dash || null)
    .attr('stroke-opacity', 0.65)
    .attr('marker-end', 'url(#arrowhead)');

  edgeSel.append('text')
    .attr('class', 'edge-label')
    .attr('text-anchor', 'middle').attr('dy', -5)
    .attr('font-size', '9.5px').attr('fill', '#9A8E80')
    .attr('font-family', "'EB Garamond', Georgia, serif")
    .text(d => d.label);

  // Node layer
  const nodeG = g.append('g').attr('class', 'nodes');
  const nodeSel = nodeG.selectAll('.node').data(simNodes).join('g')
    .attr('class', 'node')
    .attr('data-id', d => d.id)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('click', (ev, d) => {
      ev.stopPropagation();
      APP.selectNode(d.id === APP.state.selectedId ? null : d.id);
      updateNodeHighlight(nodeSel, edgeSel);
    });

  // Shapes by type
  nodeSel.each(function(d) {
    const el = d3.select(this);
    const cfg = NODE_TYPES[d.type];
    const R = nodeRadius(d);
    const fill = getNodeFill(d);
    const strk = getNodeStroke(d);

    el.append('circle').attr('class', 'node-halo').attr('r', R + 10)
      .attr('fill', 'none').attr('stroke', cfg.color).attr('stroke-width', 2.5).attr('opacity', 0);

    switch (d.type) {
      case 'person':
        el.append('circle').attr('class', 'node-shape').attr('r', R).attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
      case 'place':
        el.append('path').attr('class', 'node-shape').attr('d', diamondPath(R + 2)).attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
      case 'event':
        el.append('rect').attr('class', 'node-shape').attr('x', -R).attr('y', -R * 0.65).attr('width', R * 2).attr('height', R * 1.3)
          .attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
      case 'theme':
        el.append('path').attr('class', 'node-shape').attr('d', hexPath(R + 1)).attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
      case 'book':
        el.append('rect').attr('class', 'node-shape').attr('x', -R).attr('y', -R * 0.65).attr('width', R * 2).attr('height', R * 1.3)
          .attr('rx', 5).attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
      case 'prophecy':
        el.append('path').attr('class', 'node-shape').attr('d', starPath(R + 1)).attr('fill', fill).attr('stroke', strk).attr('stroke-width', 1.8);
        break;
    }

    el.append('text').attr('text-anchor', 'middle').attr('dy', '0.35em')
      .attr('font-size', `${Math.max(9, Math.min(13, Math.round(R * 0.62)))}px`).attr('font-weight', '600')
      .attr('fill', cfg.color).attr('font-family', "system-ui, sans-serif")
      .text(cfg.abbr);

    el.append('text').attr('class', 'node-label').attr('text-anchor', 'middle').attr('dy', R + 15)
      .attr('font-size', '11.5px').attr('font-family', "'EB Garamond', Georgia, serif")
      .attr('fill', '#2A2218').attr('font-weight', '500')
      .text(d.label);
  });

  // Hover tooltip
  nodeSel
    .on('mouseover', (ev, d) => {
      const cfg = NODE_TYPES[d.type];
      const tt = document.getElementById('node-tooltip');
      if (!tt) return;
      tt.innerHTML = `<div class="tt-type" style="color:${cfg.color}">${cfg.label}</div><div class="tt-name">${d.label}</div>${d.dates ? `<div class="tt-dates">${d.dates}</div>` : ''}`;
      tt.style.display = 'block';
      tt.style.left = (ev.pageX + 14) + 'px';
      tt.style.top  = (ev.pageY - 10) + 'px';
    })
    .on('mousemove', ev => {
      const tt = document.getElementById('node-tooltip');
      if (tt) { tt.style.left = (ev.pageX + 14) + 'px'; tt.style.top = (ev.pageY - 10) + 'px'; }
    })
    .on('mouseout', () => {
      const tt = document.getElementById('node-tooltip');
      if (tt) tt.style.display = 'none';
    });

  svg.on('click', () => { APP.selectNode(null); updateNodeHighlight(nodeSel, edgeSel); });

  // Tick
  function applyPositions() {
    edgeSel.select('line')
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    edgeSel.select('text')
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  }

  // Pre-run 200 ticks synchronously so nodes appear in settled positions immediately
  simulation.stop();
  for (let i = 0; i < 200; i++) simulation.tick();
  applyPositions();

  // Then restart for live dragging interactions
  simulation.alpha(0.15).restart();
  simulation.on('tick', applyPositions);

  // ── Keyboard navigation ────────────────────────────────────────────────────
  let kbNbrIdx = 0; let kbLastSel = null;
  document.addEventListener('keydown', ev => {
    if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT' || ev.target.tagName === 'TEXTAREA') return;
    if (ev.key === 'Escape') { ev.preventDefault(); APP.selectNode(null); updateNodeHighlight(nodeSel, edgeSel); return; }
    if (ev.key === 'Tab' && APP.state.selectedId) {
      ev.preventDefault();
      const sel = APP.state.selectedId;
      if (sel !== kbLastSel) { kbNbrIdx = 0; kbLastSel = sel; }
      const nbrs = [...new Set(EDGES.flatMap(e => {
        const s = typeof e.source === 'object' ? e.source.id : e.source;
        const t = typeof e.target === 'object' ? e.target.id : e.target;
        return s === sel ? [t] : t === sel ? [s] : [];
      }))];
      if (!nbrs.length) return;
      const nxt = nbrs[kbNbrIdx % nbrs.length]; kbNbrIdx++;
      APP.selectNode(nxt); APP.emit('focusNode', nxt); updateNodeHighlight(nodeSel, edgeSel);
    }
  });

  // ── Color mode toggle ──────────────────────────────────────────────────────
  APP.on('colorModeChanged', () => {
    nodeSel.each(function(d) {
      d3.select(this).select('.node-shape')
        .attr('fill',   getNodeFill(d))
        .attr('stroke', getNodeStroke(d));
    });
  });

  // ── Edge label toggle ──────────────────────────────────────────────────────
  APP.on('toggleEdgeLabels', show => {
    edgeSel.select('.edge-label').attr('display', show ? null : 'none');
  });

  // ── Path highlight ─────────────────────────────────────────────────────────
  APP.on('pathHighlight', path => {
    if (!path) {
      nodeSel.attr('opacity', 1);
      edgeSel.each(function(d) {
        const baseColor = (REL_TYPES[d.relType] || {color:'#C8BEA8'}).color;
        d3.select(this).select('line').attr('stroke', baseColor).attr('stroke-opacity', 0.65).attr('stroke-width', 1.4);
      });
      return;
    }
    const pathNodeSet = new Set(path.nodes);
    const pathEdgeSet = new Set(path.edges.map(e => e.id));
    nodeSel.attr('opacity', d => pathNodeSet.has(d.id) ? 1 : 0.08);
    edgeSel.each(function(d) {
      const isPath = pathEdgeSet.has(d.id);
      const baseColor = (REL_TYPES[d.relType] || {color:'#C8BEA8'}).color;
      d3.select(this).select('line')
        .attr('stroke', isPath ? '#3A1A08' : baseColor)
        .attr('stroke-opacity', isPath ? 1 : 0.04)
        .attr('stroke-width', isPath ? 3 : 1.4);
    });
  });

  // Filter listener
  APP.on('filtersChanged', ({ nodeIds, edgeIds }) => {
    const visNodeSet = new Set(nodeIds);
    const visEdgeSet = new Set(edgeIds);
    nodeSel.attr('opacity', d => visNodeSet.has(d.id) ? 1 : 0.08);
    edgeSel.attr('opacity', d => visEdgeSet.has(d.id) ? 0.9 : 0.04);
  });

  // Focus listener
  APP.on('focusNode', id => {
    const nd = simNodes.find(n => n.id === id);
    if (nd && nd.x != null) {
      const t = d3.zoomTransform(svg.node());
      svg.transition().duration(600)
        .call(d3.zoom().transform, d3.zoomIdentity
          .translate(W/2 - nd.x, H/2 - nd.y)
          .scale(1.2));
    }
    updateNodeHighlight(nodeSel, edgeSel);
  });

  // Node selected listener
  APP.on('nodeSelected', () => updateNodeHighlight(nodeSel, edgeSel));
}

function updateNodeHighlight(nodeSel, edgeSel) {
  const sel = APP.state.selectedId;
  if (!sel) {
    nodeSel.select('.node-halo').attr('opacity', 0);
    edgeSel.select('line')
      .attr('stroke', d => (REL_TYPES[d.relType] || {color:'#C8BEA8'}).color)
      .attr('stroke-width', 1.4).attr('stroke-opacity', 0.65);
    edgeSel.select('text').attr('opacity', 0.55);
    return;
  }
  nodeSel.select('.node-halo').attr('opacity', d => d.id === sel ? 1 : 0);
  const connectedIds = new Set(EDGES
    .filter(e => e.source === sel || e.target === sel)
    .flatMap(e => [e.source, e.target]));
  connectedIds.add(sel);
  nodeSel.attr('opacity', d => connectedIds.has(d.id) ? 1 : 0.2);
  edgeSel.each(function(d) {
    const srcId = typeof d.source === 'object' ? d.source.id : d.source;
    const tgtId = typeof d.target === 'object' ? d.target.id : d.target;
    const active = srcId === sel || tgtId === sel;
    const baseColor = (REL_TYPES[d.relType] || {color:'#C8BEA8'}).color;
      d3.select(this).select('line')
        .attr('stroke', active ? '#180A04' : baseColor)
        .attr('stroke-width', active ? 2.4 : 1.4)
        .attr('stroke-opacity', active ? 1 : 0.45);
    d3.select(this).select('text').attr('opacity', active ? 1 : 0.15);
  });
}

// ── TIMELINE VIEW (Option B primary) ─────────────────────────────────────────

function renderTimelineView() {
  const container = document.getElementById('timeline-view');
  if (!container) return;
  container.innerHTML = '';

  // Period bar
  const barEl = document.createElement('div');
  barEl.className = 'tl-bar';
  barEl.innerHTML = PERIODS.map(p => `
    <div class="tl-period ${APP.state.timelinePeriod === p.id ? 'tl-active' : ''}"
         data-period="${p.id}" style="border-top: 3px solid ${p.color}">
      <div class="tl-period-name">${p.label}</div>
      <div class="tl-period-years">${p.years}</div>
      <div class="tl-period-count">${NODES.filter(n => n.period === p.id).length} entities</div>
    </div>
  `).join('');
  container.appendChild(barEl);

  // Content area
  const contentEl = document.createElement('div');
  contentEl.className = 'tl-content';
  contentEl.id = 'tl-content';
  container.appendChild(contentEl);

  barEl.querySelectorAll('.tl-period').forEach(el => {
    el.addEventListener('click', () => {
      APP.state.timelinePeriod = el.dataset.period;
      barEl.querySelectorAll('.tl-period').forEach(e => e.classList.remove('tl-active'));
      el.classList.add('tl-active');
      renderTimelineContent(el.dataset.period);
    });
  });

  renderTimelineContent(APP.state.timelinePeriod);
}

function renderTimelineContent(periodId) {
  const el = document.getElementById('tl-content');
  if (!el) return;

  const period = PERIODS.find(p => p.id === periodId);
  const periodNodes = NODES.filter(n => n.period === periodId);
  const themeNodes  = NODES.filter(n => n.type === 'theme' && n.period === null);

  el.innerHTML = '';

  if (!periodNodes.length) {
    el.innerHTML = `<div class="tl-empty">No entities in this period.</div>`;
    return;
  }

  // Period header
  const hdr = document.createElement('div');
  hdr.className = 'tl-content-header';
  hdr.innerHTML = `
    <h3 style="color:${period.color === '#C8A87A' ? '#7A5A2A' : '#2A2218'}">${period.label}</h3>
    <span class="tl-years-badge">${period.years}</span>
    <span class="tl-count-badge">${periodNodes.length} entities</span>
  `;
  el.appendChild(hdr);

  // Cards grid
  const grid = document.createElement('div');
  grid.className = 'tl-grid';

  const allNodes = [...periodNodes, ...themeNodes];

  allNodes.forEach(node => {
    const cfg = NODE_TYPES[node.type];
    const relEdges = EDGES.filter(e => e.source === node.id || e.target === node.id);
    const expanded = APP.state.expandedCards.has(node.id);
    const isTheme = node.type === 'theme';

    const card = document.createElement('div');
    card.className = `tl-card${expanded ? ' expanded' : ''}${isTheme ? ' theme-card' : ''}`;
    card.style.setProperty('--node-color', cfg.color);
    card.style.setProperty('--node-bg', cfg.bg);

    card.innerHTML = `
      <div class="tl-card-header" data-id="${node.id}">
        <div class="tl-card-type" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</div>
        <div class="tl-card-title">${node.label}</div>
        <button class="tl-expand-btn" title="${expanded ? 'Collapse' : 'Show relationships'}">
          ${expanded ? '▲' : '▼'}
        </button>
      </div>
      <p class="tl-card-summary">${node.summary.slice(0, 120)}…</p>
      <div class="tl-card-relations ${expanded ? '' : 'hidden'}">
        ${relEdges.length ? relEdges.map(edge => {
          const otherId = edge.source === node.id ? edge.target : edge.source;
          const other = NODES.find(n => n.id === otherId);
          if (!other) return '';
          const oCfg = NODE_TYPES[other.type];
          const dir = edge.source === node.id ? '→' : '←';
          return `<div class="tl-rel" data-id="${other.id}">
            <span class="tl-rel-dir">${dir}</span>
            <span class="tl-rel-lbl">${edge.label}</span>
            <span class="tl-rel-node" style="color:${oCfg.color}">${other.label}</span>
          </div>`;
        }).join('') : '<div class="tl-rel-none">No direct relationships mapped</div>'}
      </div>
      ${node.passages && node.passages.length ? `
        <div class="tl-passages ${expanded ? '' : 'hidden'}">
          ${node.passages.map(p => `<span class="passage-tag">${p}</span>`).join('')}
        </div>` : ''}
    `;

    // Expand/collapse
    card.querySelector('.tl-expand-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (APP.state.expandedCards.has(node.id)) {
        APP.state.expandedCards.delete(node.id);
        card.classList.remove('expanded');
        card.querySelector('.tl-card-relations').classList.add('hidden');
        card.querySelectorAll('.tl-passages').forEach(p => p.classList.add('hidden'));
        card.querySelector('.tl-expand-btn').textContent = '▼';
      } else {
        APP.state.expandedCards.add(node.id);
        card.classList.add('expanded');
        card.querySelector('.tl-card-relations').classList.remove('hidden');
        card.querySelectorAll('.tl-passages').forEach(p => p.classList.remove('hidden'));
        card.querySelector('.tl-expand-btn').textContent = '▲';
      }
    });

    // Click header → select node
    card.querySelector('.tl-card-header').addEventListener('click', () => {
      APP.selectNode(node.id);
    });

    // Click related node → select it
    card.querySelectorAll('.tl-rel').forEach(rel => {
      rel.addEventListener('click', e => { e.stopPropagation(); APP.selectNode(rel.dataset.id); });
    });

    grid.appendChild(card);
  });

  el.appendChild(grid);
}

// ── GEOGRAPHIC MAP VIEW ──────────────────────────────────────────────────────

        <!-- Greece peninsula -->

        <!-- Region labels -->

    el.addEventListener('mouseleave', function() {

</script>
<script>
// ── INITIALIZATION ────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {

  // Hide hint once user interacts with graph
  APP.on('nodeSelected', n => {
    const hint = document.getElementById('network-hint');
    if (hint && n) hint.style.display = 'none';
  });

  // Render sidebar
  renderSidebar();

  // Init search
  initSearch();

  // Init view + option switchers
  initViewSwitcher();
  initOptionSwitcher();

  // Init network view (primary for Option A)
  // Wait one frame so container has dimensions
  setTimeout(() => {
    initNetworkView();
    initMapView();
  }, 150);

  // Edge label toggle
  const elBtn = document.getElementById('edge-label-btn');
  if (elBtn) {
    elBtn.addEventListener('click', () => {
      APP.state.showEdgeLabels = !APP.state.showEdgeLabels;
      elBtn.classList.toggle('active', APP.state.showEdgeLabels);
      APP.emit('toggleEdgeLabels', APP.state.showEdgeLabels);
    });
  }

  // Color mode toggle
  const cmBtn = document.getElementById('color-mode-btn');
  if (cmBtn) {
    cmBtn.addEventListener('click', () => {
      APP.state.colorMode = APP.state.colorMode === 'type' ? 'period' : 'type';
      cmBtn.classList.toggle('active', APP.state.colorMode === 'period');
      APP.emit('colorModeChanged');
    });
  }

  // Update option description on switch
  const descEl = document.getElementById('opt-desc');
  document.querySelectorAll('[data-option]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (descEl) {
        descEl.textContent = btn.dataset.option === 'A'
          ? 'Network is the primary view; click any node to explore relationships'
          : 'Timeline is the primary view; expand cards to reveal relationship panels';
      }
    });
  });

});
</script>
